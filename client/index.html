<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"> <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"> <title>GOLD PIXEL</title> <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"> <style>
/* CSS ROOT : Définition des couleurs de la charte Gold Pixel */
:root{
  --g1:#D4AF37;--g2:#FFD700;--g3:#FFF8CC;--gdk:#7B5800;--gdkk:#3A2800; /* Palette Gold */
  --bg:#000000;--bg1:#06050A;--bg2:#0E0C06; /* Fonds sombres militaires */
  --tx1:#F2EAD0;--tx2:#C8B888;--tx4:#3A3020; /* Couleurs de texte */
  --r1:#BB1606;--r2:#FF2E18; /* Alertes et erreurs */
  --cy:#00CCFF;--gr:#42FF88; /* Couleurs Tech */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent} /* Reset CSS standard */
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;color:var(--tx1);touch-action:none} /* Setup body */
#app{display:flex;flex-direction:column;width:100%;height:100%;position:fixed;inset:0} /* Container principal */

/* HEADER & HUD */
#hdr{flex-shrink:0;z-index:30;position:relative;background:linear-gradient(180deg,#221E12 0%,#161208 45%,#0C0A06 100%);box-shadow:0 4px 28px rgba(0,0,0,.95)} /* Style barre haute */
#hdr-gold-line{position:absolute;bottom:0;left:0;right:0;height:2px;z-index:2;background:linear-gradient(90deg,transparent,var(--gdk) 10%,var(--g1) 30%,var(--g2) 50%,var(--g1) 70%,var(--gdk) 90%,transparent)} /* Ligne dorée animée */
#hdr-main{display:flex;align-items:stretch;padding:7px 10px 6px;position:relative;z-index:1} /* Flexbox header */

/* AVATAR & PLAYER INFO */
#avatar{width:62px;height:62px;flex-shrink:0;position:relative;border:2px solid var(--g1);overflow:hidden;background:linear-gradient(160deg,#141008,#060402)} /* Cadre avatar */
#grade-pin{position:absolute;bottom:0;left:0;z-index:4;background:var(--g1);color:#000;font-family:'Orbitron',monospace;font-size:7px;font-weight:900;padding:1px 6px} /* Badge de grade */
#pname{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--tx1);letter-spacing:.5px} /* Pseudo du joueur */
.gbg{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--g1);background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.42);padding:1px 7px} /* Badge G3 */

/* HUD CHIPS (Œil, Dôme, Réservoir) */
.chip{display:flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid transparent;position:relative;overflow:hidden} /* Container indicateur */
#c-eye{background:linear-gradient(135deg,rgba(44,3,1,.97),rgba(18,1,0,.99));border-color:rgba(165,15,4,.85);animation:eyeFrame 1.1s infinite} /* Alerte Pack Vengeance */
#c-res{display:flex;flex-direction:column;padding:5px 11px;min-width:150px;background:linear-gradient(135deg,rgba(12,8,0,.97),rgba(5,3,0,.99));border:1px solid rgba(212,175,55,.3)} /* Réservoir */
#rfill{height:100%;border-radius:2px;transition:width .5s;background:linear-gradient(90deg,var(--gdk),var(--g2));box-shadow:0 0 7px rgba(212,175,55,.75)} /* Barre de progression pixels */

/* CANVAS AREA */
#cvz{flex:1;overflow:hidden;position:relative;cursor:crosshair;background:radial-gradient(ellipse at 50% 45%,#08060E 0%,#020204 100%)} /* Zone du canvas */
#cv{display:block;image-rendering:pixelated} /* Canvas principal sans flou */
.fe{position:absolute;background:var(--g2);box-shadow:0 0 9px var(--g1);animation:fg 3s infinite} /* Bordures dorées du cadre */

/* BOTTOM BAR & PALETTE */
#btm{flex-shrink:0;position:relative;z-index:20;background:linear-gradient(0deg,#050402 0%,#0E0A06 55%,#0A0804 100%);padding:7px 8px 10px} /* Barre basse */
#prow{display:flex;gap:3px;overflow-x:auto;padding-bottom:2px;margin-bottom:7px} /* Ligne de couleurs */
.sw{width:32px;height:32px;flex-shrink:0;cursor:pointer;border-radius:2px;border:1px solid rgba(0,0,0,.3)} /* Pastille de couleur */
.abt{flex:1;height:46px;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;clip-path:polygon(7px 0%,calc(100% - 7px) 0%,100% 7px,100% calc(100% - 7px),calc(100% - 7px) 100%,7px 100%,0% calc(100% - 7px),0% 7px)} /* Boutons actions */

/* SHOP & OVERLAYS */
#shop,#layer-panel{position:fixed;inset:0;z-index:700;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.88);backdrop-filter:blur(4px)} /* Fond obscurci panels */
.si{background:linear-gradient(135deg,rgba(20,15,2,.98),rgba(8,6,0,.99));border:1px solid rgba(212,175,55,.26);padding:11px;cursor:pointer} /* Item boutique */
#toast{position:fixed;bottom:165px;left:50%;transform:translateX(-50%);background:#000;border:1px solid var(--g1);color:var(--g1);padding:8px 22px;z-index:999;opacity:0} /* Notifications */
#toast.on{opacity:1} /* Affichage toast */

/* ANIMATIONS */
@keyframes eyeFrame{0%,100%{border-color:rgba(150,12,3,.8)}50%{border-color:rgba(255,55,20,1)}} /* Clignotement rouge alerte */
@keyframes fg{0%,100%{opacity:.7}50%{opacity:1}} /* Pulsation cadre doré */
</style>
</head>
<body>
<div id="app">
    <div id="hdr">
        <div id="hdr-gold-line"></div>
        <div id="hdr-main">
            <div id="player-left">
                <div id="avatar">
                    <div id="grade-pin">G3</div>
                    <svg id="sv" viewBox="0 0 62 62" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="62" height="62" fill="#181208"/>
                        <rect x="5" y="38" width="52" height="24" fill="#4C5436"/>
                        <rect x="18" y="23" width="26" height="15" fill="#D0A668"/>
                        <rect x="15" y="10" width="32" height="15" fill="#606840"/> </svg>
                </div>
                <div id="player-info">
                    <div id="pname">Soldat_7749</div>
                    <div id="psub"><span class="gbg">G3</span></div>
                </div>
            </div>
            <div id="hud">
                <div id="h1">
                    <div class="chip" id="c-eye" onclick="triggerEye()"><span class="eye-i">👁</span> <span id="eye-v">14/30</span></div>
                    <div class="chip" id="c-dome"><span class="ic">🛡</span> <span id="dome-v">—:——</span></div>
                </div>
                <div id="h2">
                    <div id="c-res">
                        <div id="r1"><div id="rleft">⚡ <span id="rnum">14</span></div><span id="rof">/ 30 px</span></div>
                        <div id="rbg"><div id="rfill" style="width:46%"></div></div>
                        <div id="rtimer">⏱ 03:58</div>
                    </div>
                </div>
                <div id="h3"><div id="c-pi"><span id="pi-s">π</span> <span id="pi-v">515.23</span></div></div>
            </div>
        </div>
    </div>

    <div id="cvz">
        <div id="cvc">
            <canvas id="cv"></canvas> <canvas id="csh"></canvas> <canvas id="cgr"></canvas> </div>
        <div id="cvtt"></div> </div>

    <div id="btm">
        <div id="br1">
            <div id="ptabs">
                <div class="pt on" onclick="switchTab('std',this)">Matte</div>
                <div class="pt" onclick="switchTab('pre',this)">Gold</div>
            </div>
            <div id="selc" style="background:#FFD700"></div>
            <div id="crwrap">
                <div id="coords"><span id="cic">⌖</span> <span id="cvv">X: — | Y: —</span></div>
                <div id="rbtn" onclick="resetView()">⊡ FIT</div>
            </div>
        </div>
        <div id="prow"></div> <div id="br3">
            <div class="abt" id="bt-c" onclick="cancelLast()">↩ ANNULER</div>
            <div class="abt" id="bt-s" onclick="openShop()">🛒 BOUTIQUE</div>
            <div class="abt" id="bt-l" onclick="openLayer()">⊞ CALQUE</div>
        </div>
    </div>
</div>

<div id="shop" onclick="closeShop()">
    <div id="shopbox" onclick="event.stopPropagation()">
        <h2>🛒 BOUTIQUE GOLD</h2>
        <div class="sgrid">
            <div class="si" onclick="buy('dome4h')"><div class="si-nm">🛡 Dôme 4H</div><div class="si-pr">0.5 π</div></div>
            <div class="si" onclick="buy('big')"><div class="si-nm">🔋 Big Charger</div><div class="si-pr">2 π</div></div>
        </div>
        <div id="shop-close" onclick="closeShop()">✕ FERMER</div>
    </div>
</div>
<div id="toast"></div>

<script>
/* LOGIQUE DU MOTEUR GOLD PIXEL */
const CFG = { CW:3200, CH:1800, PROTECT_MS:30000 }; // Config dimensions et protection
const S = { res:14, maxRes:30, pi:515.23, color:'#FFD700', zoom:1, px:0, py:0, owners:new Map() }; // État du jeu

const CV = document.getElementById('cv'); // Récupère le canvas
const CTX = CV.getContext('2d'); // Contexte 2D
CV.width = CFG.CW; CV.height = CFG.CH; // Applique les dimensions

function initCanvas() { // Initialise le champ de bataille
    CTX.fillStyle = '#04040A'; // Couleur de fond Reset
    CTX.fillRect(0, 0, CFG.CW, CFG.CH); // Remplit le fond
    buildPalette(); // Génère les pastilles de couleur
}

function buildPalette() { // Crée les boutons de couleurs
    const row = document.getElementById('prow');
    ['#FFFFFF','#FF0000','#00FF00','#0000FF','#D4AF37','#FFD700'].forEach(c => {
        const sw = document.createElement('div');
        sw.className = 'sw'; sw.style.background = c;
        sw.onclick = () => { S.color = c; document.getElementById('selc').style.background = c; };
        row.appendChild(sw);
    });
}

function placePx(x, y) { // Fonction de pose de pixel
    if(S.res <= 0) return toast("Réservoir vide !"); // Vérifie les munitions
    CTX.fillStyle = S.color; // Applique la couleur choisie
    CTX.fillRect(x, y, 1, 1); // Dessine le pixel 1x1
    S.res--; updateHUD(); // Décompte et MAJ interface
}

function updateHUD() { // Met à jour les compteurs visuels
    document.getElementById('rnum').textContent = S.res;
    document.getElementById('rfill').style.width = (S.res/S.maxRes*100) + '%';
    document.getElementById('pi-v').textContent = S.pi.toFixed(2);
}

function toast(m) { // Affiche une notification
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('on');
    setTimeout(() => t.classList.remove('on'), 3000);
}

// Event de clic sur le canvas (simplifié pour l'exemple)
CV.addEventListener('mousedown', (e) => {
    const rect = CV.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left));
    const y = Math.floor((e.clientY - rect.top));
    placePx(x, y);
});

function openShop() { document.getElementById('shop').style.display = 'flex'; } // Ouvre la boutique
function closeShop() { document.getElementById('shop').style.display = 'none'; } // Ferme la boutique

initCanvas(); // Lance le moteur au chargement
</script>
</body>
</html>
