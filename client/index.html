<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>Gold Pixel - Live</title> <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script> <style>
        body { margin: 0; background: #050b14; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; } /* Style Matte sombre */
        canvas { background: white; image-rendering: pixelated; border: 2px solid #ffaa00; max-width: 95vw; max-height: 95vh; } /* Bordure Gold */
    </style>
</head>
<body>
    <canvas id="grid"></canvas> <script>
        // Connexion au serveur Render
        const socket = io("https://gold-pixel.onrender.com"); // Se connecte à ton serveur live sur Render
        const canvas = document.getElementById('grid'); // Récupère l'élément Canvas du HTML
        const ctx = canvas.getContext('2d'); // Prépare le contexte de dessin en 2D
        const TAILLE = 512; // Définit la taille interne du canevas
        canvas.width = TAILLE; canvas.height = TAILLE; // Applique la taille au canevas

        // Réception du canevas initial
        socket.on('init_canvas', (data) => { // Événement reçu à la première connexion
            const imgData = ctx.createImageData(TAILLE, TAILLE); // Crée un conteneur de données d'image
            for (let i = 0; i < data.length; i += 3) { // Boucle à travers les données RVB reçues
                const p = (i / 3) * 4; // Calcule la position dans le tableau RGBA du canevas
                imgData.data[p] = data[i]; imgData.data[p+1] = data[i+1]; imgData.data[p+2] = data[i+2]; imgData.data[p+3] = 255; // Remplit les couleurs
            }
            ctx.putImageData(imgData, 0, 0); // Dessine l'image complète sur le canevas
        });

        // Mise à jour d'un pixel en temps réel
        socket.on('pixel_update', ({ x, y, color }) => { // Événement reçu quand un joueur pose un pixel
            ctx.fillStyle = `rgb(${color[0]},${color[1]},${color[2]})`; // Définit la couleur de remplissage
            ctx.fillRect(x, y, 1, 1); // Dessine le petit carré d'un pixel à la position donnée
        });

        // Interaction utilisateur (clic/toucher)
        canvas.addEventListener('click', (e) => { // Déclenche une action au clic sur le canevas
            const rect = canvas.getBoundingClientRect(); // Calcule la position réelle du canevas à l'écran
            const x = Math.floor((e.clientX - rect.left) / (rect.width / TAILLE)); // Calcule la coordonnée X relative
            const y = Math.floor((e.clientY - rect.top) / (rect.height / TAILLE)); // Calcule la coordonnée Y relative
            socket.emit('claim_pixel', { x, y, color: [214, 166, 58] }); // Envoie l'ordre de poser un pixel "Gold" au serveur
        });
    </script>
</body>
</html>
